<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Stream API - Client Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.95;
      font-weight: 500;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #ffffff;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
      margin-bottom: 16px;
      align-items: flex-start;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.user .message-bubble {
      order: 2;
    }

    .message.ai {
      justify-content: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      font-weight: bold;
      order: 1;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      order: 2;
    }

    .message.ai .message-avatar {
      background: #f0f0f0;
      color: #333;
    }

    .message-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 15px;
      animation: fadeIn 0.2s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .user .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 18px;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
      font-weight: 500;
    }

    .ai .message-bubble {
      background: #f9f9f9;
      color: #333;
      border-radius: 12px;
      border: 1px solid #ececec;
    }

    /* Code block styling */
    .message-bubble pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .message-bubble code {
      font-family: 'Monaco', 'Courier New', monospace;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 14px;
    }

    .ai .message-bubble code {
      background: #e5e5e5;
      color: #d14;
    }

    .message-bubble strong {
      font-weight: 600;
      color: #333;
    }

    .ai .message-bubble strong {
      color: #333;
    }

    .message-bubble em {
      font-style: italic;
      opacity: 0.9;
    }

    .message-bubble ul,
    .message-bubble ol {
      margin: 8px 0 8px 20px;
      line-height: 1.8;
    }

    .message-bubble li {
      margin-bottom: 4px;
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 12px 16px;
      background: #f9f9f9;
      border-radius: 12px;
      border: 1px solid #ececec;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        background: #bbb;
      }
      40% {
        transform: translateY(-8px);
        background: #667eea;
      }
    }

    .input-area {
      border-top: 1px solid #e5e5e5;
      padding: 16px 40px;
      display: flex;
      gap: 10px;
      background: #ffffff;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      background: #f7f7f7;
      font-family: inherit;
    }

    .input-area input:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .input-area button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      min-width: 50px;
    }

    .input-area button:hover:not(:disabled) {
      background: #764ba2;
      transform: scale(1.02);
    }

    .input-area button:active:not(:disabled) {
      transform: scale(0.98);
    }

    .input-area button:disabled {
      background: #d0d0d0;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .error-message {
      background: #fef2f2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #dc2626;
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    /* Scrollbar styling */
    .chat-container::-webkit-scrollbar {
      width: 8px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: #d0d0d0;
      border-radius: 4px;
    }

    .chat-container::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Gemini Stream Chat</h1>
      <p>Real-time AI responses via Gemini 2.5 Flash</p>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="status" id="status">Ready to chat</div>

    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Ask me anything...  (Press Enter to send)"
        autocomplete="off"
      />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://kaani.onrender.com'; // Change if deployed elsewhere
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const status = document.getElementById('status');
    let isWaitingForResponse = false;

    /**
     * Add a message to the chat display
     */
    function addMessage(text, isUser = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = isUser ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = text; // Use innerHTML to support formatted text

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      return bubble; // Return for updating if streaming
    }

    /**
     * Escape HTML special characters
     */
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, char => map[char]);
    }

    /**
     * Format text with basic markdown support
     */
    function formatText(text) {
      text = escapeHtml(text);
      
      // Bold **text** → <strong>text</strong>
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
      // Italic *text* → <em>text</em>
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // Inline code `text` → <code>text</code>
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // Line breaks
      text = text.replace(/\n/g, '<br>');
      
      return text;
    }

    /**
     * Show typing indicator
     */
    function showTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ai';
      messageDiv.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🤖';

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(typing);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    /**
     * Remove typing indicator
     */
    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }

    /**
     * Stream response from API using Server-Sent Events
     * Recommended endpoint: /api/chat
     */
    async function streamResponseSSE(message) {
      try {
        isWaitingForResponse = true;
        sendButton.disabled = true;
        status.textContent = '⏳ Waiting for response...';

        showTypingIndicator();

        const response = await fetch(`${API_URL}/api/chat-bot/send-message`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        removeTypingIndicator();

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let aiMessage = addMessage('', false);
        let fullText = '';
        let buffer = '';

        status.textContent = '✅ Receiving response...';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // Keep incomplete line

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));

                if (data.type === 'chunk') {
                  fullText += data.content;
                  aiMessage.innerHTML = formatText(fullText);
                  chatContainer.scrollTop = chatContainer.scrollHeight;
                } else if (data.type === 'error') {
                  const errorDiv = document.createElement('div');
                  errorDiv.className = 'error-message';
                  errorDiv.textContent = `Error: ${data.content}`;
                  chatContainer.appendChild(errorDiv);
                }
              } catch (e) {
                console.error('Parse error:', e);
              }
            }
          }
        }

        status.textContent = '✅ Response complete';
      } catch (error) {
        console.error('Stream error:', error);
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = `Connection error: ${error.message}`;
        chatContainer.appendChild(errorDiv);
        status.textContent = '❌ Error occurred';

        removeTypingIndicator();
      } finally {
        isWaitingForResponse = false;
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    /**
     * Alternative: Stream response using plain text
     * Less featured but simpler endpoint: /api/chat/simple
     */
    async function streamResponsePlain(message) {
      try {
        isWaitingForResponse = true;
        sendButton.disabled = true;
        status.textContent = '⏳ Waiting for response...';

        showTypingIndicator();

        const response = await fetch(`${API_URL}/api/chat/simple`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        removeTypingIndicator();

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let aiMessage = addMessage('', false);
        let fullText = '';

        status.textContent = '✅ Receiving response...';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          fullText += chunk;
          aiMessage.innerHTML = formatText(fullText);
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        status.textContent = '✅ Response complete';
      } catch (error) {
        console.error('Stream error:', error);
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = `Connection error: ${error.message}`;
        chatContainer.appendChild(errorDiv);
        status.textContent = '❌ Error occurred';

        removeTypingIndicator();
      } finally {
        isWaitingForResponse = false;
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    /**
     * Send message handler
     */
    async function sendMessage() {
      const text = messageInput.value.trim();

      if (!text || isWaitingForResponse) return;

      // Add user message with formatting
      const userBubble = addMessage('', true);
      userBubble.innerHTML = formatText(text);
      messageInput.value = '';

      // Stream AI response
      await streamResponseSSE(text);
      // Or use: await streamResponsePlain(text);
    }

    /**
     * Event listeners
     */
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Focus input on load
    messageInput.focus();
  </script>
</body>
</html>
